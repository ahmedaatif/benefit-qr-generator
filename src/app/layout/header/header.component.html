<div class="border-bottom">
    <div class="container">
        <header class="d-flex flex-wrap justify-content-center align-items-center py-3 ">
            <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
                <span class="fs-4">{{ 'header.brand' | translate }}</span>
            </a>

            <ul class="nav nav-pills gap-1 mb-3 mb-md-0">
                <li class="nav-item"><a class="nav-link" routerLink="/home" routerLinkActive="active" ariaCurrentWhenActive="page">{{ 'header.nav.home' | translate }}</a></li>
                <li class="nav-item"><a class="nav-link" routerLink="/generate-qr" routerLinkActive="active" ariaCurrentWhenActive="page">{{ 'header.nav.generateQr' | translate }}</a></li>
                <li class="nav-item">
                    <button type="button" class="btn btn-outline-secondary h-100" (click)="toggleLanguage()" [attr.aria-label]="'Switch language'">
                        {{ translation.oppositeLanguageLabel }}
                    </button>
                </li>
            </ul>
        </header>
    </div>
</div>
